<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">SIKU ventilation icon</title>
  <desc id="desc">Rounded square icon with two circular airflow arrows around a heat recovery core.</desc>
  <defs>
    <linearGradient id="bg" x1="32" y1="28" x2="224" y2="228" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0e2b43" />
      <stop offset="1" stop-color="#1f6f9f" />
    </linearGradient>
    <linearGradient id="core" x1="104" y1="96" x2="152" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffd572" />
      <stop offset="1" stop-color="#ff8b2b" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#071724" flood-opacity="0.28" />
    </filter>
    <marker id="arrowCyan" markerWidth="10" markerHeight="10" refX="6.2" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L9,5 L1,9 z" fill="#6fe7ff" />
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="6.2" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L9,5 L1,9 z" fill="#ffb248" />
    </marker>
  </defs>

  <rect x="16" y="16" width="224" height="224" rx="52" fill="url(#bg)" />

  <g filter="url(#shadow)">
    <circle cx="128" cy="128" r="82" fill="rgba(255,255,255,0.06)" stroke="#b5ecff" stroke-opacity="0.25" stroke-width="3" />
    <path
      d="M78 166 A64 64 0 0 1 155 73"
      fill="none"
      stroke="#6fe7ff"
      stroke-width="16"
      stroke-linecap="round"
      marker-end="url(#arrowCyan)"
    />
    <path
      d="M178 90 A64 64 0 0 1 102 183"
      fill="none"
      stroke="#ffb248"
      stroke-width="16"
      stroke-linecap="round"
      marker-end="url(#arrowOrange)"
    />
    <circle cx="128" cy="128" r="26" fill="url(#core)" />
    <circle cx="128" cy="128" r="11" fill="#ffffff" fill-opacity="0.88" />
  </g>

  <path d="M44 190 C76 168 95 168 127 190" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="6" stroke-linecap="round" />
  <path d="M129 190 C161 168 180 168 212 190" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="6" stroke-linecap="round" />
</svg>
