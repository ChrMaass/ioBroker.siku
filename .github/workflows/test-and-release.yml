name: Test and Release

on:
  push:
    branches:
      - "main"
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-**"
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-and-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: ioBroker/testing-action-check@v1
        with:
          node-version: '20.x'
          type-checking: true
          lint: true

  adapter-tests-smoke:
    needs: check-and-lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: ioBroker/testing-action-adapter@v1
        with:
          node-version: '20.x'
          os: ubuntu-latest
          build: true

  adapter-tests:
    needs: check-and-lint
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - node-version: 20.x
            os: ubuntu-latest
          - node-version: 22.x
            os: ubuntu-latest
          - node-version: 24.x
            os: ubuntu-latest
          - node-version: 22.x
            os: macos-latest

    steps:
      - uses: ioBroker/testing-action-adapter@v1
        with:
          node-version: ${{ matrix.node-version }}
          os: ${{ matrix.os }}
          build: true

  deploy:
    needs: [check-and-lint, adapter-tests]
    if: |
      vars.ENABLE_NPM_RELEASE == 'true' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.check-and-lint.result == 'success' &&
      needs.adapter-tests.result == 'success'
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write

    steps:
      - uses: ioBroker/testing-action-deploy@v1
        with:
          node-version: '24.x'
          github-token: ${{ secrets.GITHUB_TOKEN }}
