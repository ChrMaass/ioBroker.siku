name: Test and Release

on:
  push:
    branches:
      - "main"
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-**"
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-and-lint:
    if: github.event_name != 'push' || contains(github.event.head_commit.message, '[skip ci]') == false
    runs-on: ubuntu-latest

    steps:
      - uses: ioBroker/testing-action-check@v1
        with:
          node-version: '22.x'
          type-checking: true
          lint: true

  adapter-tests-pr:
    needs: check-and-lint
    if: |
      (github.event_name != 'push' || contains(github.event.head_commit.message, '[skip ci]') == false) &&
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: ioBroker/testing-action-adapter@v1
        with:
          node-version: '20.x'
          os: ubuntu-latest
          build: true

  adapter-tests-main:
    needs: check-and-lint
    if: |
      (github.event_name != 'push' || contains(github.event.head_commit.message, '[skip ci]') == false) &&
      github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - node-version: 20.x
            os: ubuntu-latest
          - node-version: 22.x
            os: ubuntu-latest
          - node-version: 24.x
            os: ubuntu-latest
          - node-version: 22.x
            os: macos-latest
          - node-version: 22.x
            os: windows-latest

    steps:
      - uses: ioBroker/testing-action-adapter@v1
        with:
          node-version: ${{ matrix.node-version }}
          os: ${{ matrix.os }}
          build: true

  deploy:
    needs: [check-and-lint, adapter-tests-main]
    if: |
      (github.event_name != 'push' || contains(github.event.head_commit.message, '[skip ci]') == false) &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v') &&
      vars.ENABLE_NPM_RELEASE == 'true'
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write

    steps:
      - uses: ioBroker/testing-action-deploy@v1
        with:
          node-version: '22.x'
          build: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
