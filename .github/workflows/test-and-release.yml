name: Test and Release

on:
  push:
    branches:
      - "main"
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-**"
  pull_request: {}
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to publish from
        required: false
        type: string
      publish_only:
        description: Skip lint/tests and only run npm publish + GitHub release for release_tag
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check-and-lint:
    if: |
      (github.event_name != 'push' || contains(github.event.head_commit.message, '[skip ci]') == false) &&
      (github.event_name != 'workflow_dispatch' || inputs.publish_only != true)
    runs-on: ubuntu-latest

    steps:
      - uses: ioBroker/testing-action-check@v1
        with:
          node-version: '20.x'
          type-checking: true
          lint: true

  adapter-tests-smoke:
    needs: check-and-lint
    if: |
      (github.event_name != 'push' || contains(github.event.head_commit.message, '[skip ci]') == false) &&
      github.event_name == 'pull_request' &&
      (github.event_name != 'workflow_dispatch' || inputs.publish_only != true)
    runs-on: ubuntu-latest

    steps:
      - uses: ioBroker/testing-action-adapter@v1
        with:
          node-version: '20.x'
          os: ubuntu-latest
          build: true

  adapter-tests:
    needs: check-and-lint
    if: |
      (github.event_name != 'push' || contains(github.event.head_commit.message, '[skip ci]') == false) &&
      github.event_name != 'pull_request' &&
      (github.event_name != 'workflow_dispatch' || inputs.publish_only != true)
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - node-version: 20.x
            os: ubuntu-latest
          - node-version: 22.x
            os: ubuntu-latest
          - node-version: 24.x
            os: ubuntu-latest
          - node-version: 22.x
            os: macos-latest

    steps:
      - uses: ioBroker/testing-action-adapter@v1
        with:
          node-version: ${{ matrix.node-version }}
          os: ${{ matrix.os }}
          build: true

  deploy:
    needs: [check-and-lint, adapter-tests]
    if: |
      always() &&
      vars.ENABLE_NPM_RELEASE == 'true' &&
      (
        (
          github.event_name == 'push' &&
          startsWith(github.ref, 'refs/tags/v') &&
          needs.check-and-lint.result == 'success' &&
          needs.adapter-tests.result == 'success'
        ) ||
        (
          github.event_name == 'workflow_dispatch' &&
          inputs.release_tag != '' &&
          (
            inputs.publish_only == true ||
            (
              needs.check-and-lint.result == 'success' &&
              needs.adapter-tests.result == 'success'
            )
          )
        )
      )
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = 'workflow_dispatch' ]; then
            tag="${{ inputs.release_tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].+)?$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check out release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0

      - name: Set up Node.js for trusted publishing
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build release artifacts
        run: npm run build

      - name: Verify package version matches the release tag
        id: package
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          expected_tag="v$version"

          if [ "$expected_tag" != "${{ steps.release.outputs.tag }}" ]; then
            echo "package.json version $version does not match tag ${{ steps.release.outputs.tag }}" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check whether this npm version already exists
        id: npm-status
        shell: bash
        run: |
          if npm view "iobroker.siku@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo 'already_published=true' >> "$GITHUB_OUTPUT"
          else
            echo 'already_published=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package to npm via Trusted Publishing
        if: steps.npm-status.outputs.already_published != 'true'
        run: npm publish --access public

      - name: Determine previous release tag
        id: previous
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          previous_tag="$(git tag --sort=-version:refname | grep -Fxv "$RELEASE_TAG" | head -n 1 || true)"
          echo "tag=$previous_tag" >> "$GITHUB_OUTPUT"

      - name: Install GitHub Copilot CLI for optional release notes
        if: secrets.COPILOT_GITHUB_TOKEN != ''
        run: npm install --global @github/copilot

      - name: Generate optional Copilot release summary
        if: secrets.COPILOT_GITHUB_TOKEN != ''
        continue-on-error: true
        shell: bash
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          PREVIOUS_TAG: ${{ steps.previous.outputs.tag }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          if [ -n "$PREVIOUS_TAG" ]; then
            range="$PREVIOUS_TAG..$RELEASE_TAG"
          else
            range="$RELEASE_TAG"
          fi

          copilot \
            -p "Review the commits and file changes in git range $range for this repository. Write a concise Markdown release summary for end users of the ioBroker.siku adapter: one short intro sentence and up to 5 bullet points focused on user-visible changes. Save the result to copilot-release-notes.md." \
            --allow-tool='shell(git:*)' \
            --allow-tool=write \
            --no-ask-user

      - name: Create GitHub release with generated notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          PREVIOUS_TAG: ${{ steps.previous.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "GitHub release $RELEASE_TAG already exists; skipping creation."
            exit 0
          fi

          prerelease_flag=()
          if [[ "$RELEASE_TAG" == *-* ]]; then
            prerelease_flag+=(--prerelease)
          fi

          extra_args=()
          if [ -n "$PREVIOUS_TAG" ]; then
            extra_args+=(--notes-start-tag "$PREVIOUS_TAG")
          fi

          if [ -s copilot-release-notes.md ]; then
            notes="$(cat copilot-release-notes.md)"
            gh release create "$RELEASE_TAG" \
              --verify-tag \
              --generate-notes \
              --notes "$notes" \
              "${prerelease_flag[@]}" \
              "${extra_args[@]}"
          else
            gh release create "$RELEASE_TAG" \
              --verify-tag \
              --generate-notes \
              "${prerelease_flag[@]}" \
              "${extra_args[@]}"
          fi
