version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
      time: "00:05"
      timezone: Europe/Berlin
    cooldown:
      default-days: 7
    open-pull-requests-limit: 15
    assignees:
      - ChrMaass
    versioning-strategy: increase

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      time: "00:05"
      timezone: Europe/Berlin
    cooldown:
      default-days: 7
    open-pull-requests-limit: 15
    assignees:
      - ChrMaass
